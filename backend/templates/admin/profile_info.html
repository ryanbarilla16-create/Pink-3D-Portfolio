{% extends "admin/base.html" %}
{% block content %}

<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
  <div>
    <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2">Profile Info</h1>
    <p class="text-gray-500 flex items-center gap-2">
      <span class="text-sm font-medium">Update your professional profile and presence.</span>
      <span class="w-1.5 h-1.5 rounded-full bg-brand-200"></span>
      <span class="inline-flex items-center gap-1.5 text-xs text-brand-500 font-bold uppercase tracking-widest">
        Live Editor
      </span>
    </p>
  </div>
</div>

<form method="POST" enctype="multipart/form-data" class="max-w-6xl mx-auto space-y-10">
  <div class="grid lg:grid-cols-2 gap-10">

    <!-- Personal Info Card -->
    <div class="bg-white/60 backdrop-blur-xl rounded-[2.5rem] border border-white/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10 space-y-8 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(236,72,153,0.1)]">
      <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-2xl bg-brand-50 flex items-center justify-center text-brand-500 shadow-sm">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <h2 class="text-2xl font-black text-gray-800">Core Details</h2>
      </div>

      <div class="space-y-6">
        <div class="group/field space-y-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Full Name</label>
          <input type="text" name="name" value="{{ profile.get('name', '') }}"
            class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
        </div>
        <div class="group/field space-y-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Title / Role</label>
          <input type="text" name="title" value="{{ profile.get('title', '') }}"
            class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
        </div>
        <div class="group/field space-y-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Professional Bio</label>
          <textarea name="bio" rows="4"
            class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm resize-none leading-relaxed">{{ profile.get('bio', '') }}</textarea>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div class="group/field space-y-2">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Email Address</label>
            <input type="email" name="email" value="{{ profile.get('email', '') }}"
              class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
          </div>
          <div class="group/field space-y-2">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Phone Number</label>
            <input type="text" name="phone" value="{{ profile.get('phone', '') }}"
              class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
          </div>
        </div>

        <div class="group/field space-y-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Current Location</label>
          <input type="text" name="location" value="{{ profile.get('location', '') }}"
            class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
        </div>
      </div>
    </div>

    <!-- Right Column: Socials & Resume -->
    <div class="space-y-10">
      <!-- Social Links Card -->
      <div class="bg-white/60 backdrop-blur-xl rounded-[2.5rem] border border-white/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10 space-y-6 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(236,72,153,0.1)]">
        <div class="flex items-center gap-4 mb-2">
          <div class="w-12 h-12 rounded-2xl bg-purple-50 flex items-center justify-center text-purple-500 shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.828a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          </div>
          <h2 class="text-2xl font-black text-gray-800">Online Presence</h2>
        </div>

        <div class="space-y-4">
          <div class="group/field space-y-2">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">GitHub Profile</label>
            <input type="url" name="github" value="{{ profile.get('github', '') }}" placeholder="https://github.com/..."
              class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
          </div>
          <div class="group/field space-y-2">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">LinkedIn Profile</label>
            <input type="url" name="linkedin" value="{{ profile.get('linkedin', '') }}" placeholder="https://linkedin.com/in/..."
              class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
          </div>
          <div class="group/field space-y-2">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2 group-focus-within/field:text-brand-500 transition-colors">Instagram Profile</label>
            <input type="url" name="instagram" value="{{ profile.get('instagram', '') }}" placeholder="https://instagram.com/..."
              class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 focus:outline-none focus:ring-4 focus:ring-brand-400/10 focus:border-brand-400 text-sm transition-all font-bold shadow-sm"/>
          </div>
        </div>
      </div>

      <!-- Resume Card -->
      <div class="bg-white/60 backdrop-blur-xl rounded-[2.5rem] border border-white/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10 transition-all duration-300 hover:shadow-[0_20px_50px_rgba(236,72,153,0.1)]">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-500 shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <h2 class="text-2xl font-black text-gray-800">Resume / CV</h2>
        </div>

        {% if profile.get('resume_url') %}
        <div class="flex items-center gap-4 p-4 bg-emerald-50/50 border border-emerald-100 rounded-2xl mb-6 group/resume">
          <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-emerald-500 shadow-sm group-hover/resume:scale-110 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          </div>
          <div class="flex-1">
            <p class="text-xs font-black text-emerald-700 uppercase tracking-widest">Active Resume</p>
            <p class="text-[10px] text-emerald-600/60 font-bold uppercase tracking-widest mt-0.5">PDF Document Ready</p>
          </div>
          <a href="/api/resume" class="px-4 py-2 bg-white text-emerald-600 text-[10px] font-black rounded-lg shadow-sm hover:shadow-md transition-all uppercase tracking-widest">Download</a>
        </div>
        {% endif %}

        <div class="group relative overflow-hidden bg-brand-50/50 border-2 border-dashed border-brand-200 rounded-3xl p-8 text-center cursor-pointer hover:bg-brand-50/80 hover:border-brand-400 transition-all duration-300"
             onclick="document.getElementById('resumeFile').click()">
          <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-brand-400 shadow-sm mx-auto mb-3 group-hover:scale-110 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
          </div>
          <p class="text-xs font-black text-gray-500 uppercase tracking-widest">Upload New PDF</p>
          <p id="resumeName" class="text-[10px] text-brand-500 font-bold mt-2 uppercase truncate px-4"></p>
        </div>
        <input type="file" name="resume" id="resumeFile" accept=".pdf" class="hidden"
               onchange="document.getElementById('resumeName').textContent = this.files[0]?.name || ''"/>
      </div>
    </div>
  </div>

  <!-- Save Button Floating Action -->
  <div class="sticky bottom-10 flex justify-center pt-10">
    <button type="submit"
      class="group relative px-12 py-5 bg-gradient-to-r from-brand-500 via-brand-600 to-purple-600 text-white text-xl font-black rounded-[2rem] shadow-[0_20px_50px_rgba(236,72,153,0.3)] hover:shadow-[0_20px_60px_rgba(236,72,153,0.5)] hover:-translate-y-1 active:scale-[0.98] transition-all flex items-center justify-center gap-4 overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
      <span>Commit Changes</span>
    </button>
  </div>
</form>

<style>
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  form > div { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  form > div:nth-child(2) { animation-delay: 0.1s; }
</style>

{% endblock %}
