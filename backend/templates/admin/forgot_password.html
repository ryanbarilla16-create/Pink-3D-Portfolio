<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Ryan Bien</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-white to-purple-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-pink-100 p-8">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-400 to-purple-400 flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Forgot Password</h1>
        <p class="text-sm text-gray-500 mt-1">Enter your email to receive a verification code</p>
      </div>

      <!-- Flash messages -->
      {% with flashes = get_flashed_messages(with_categories=true) %}
        {% for category, msg in flashes %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
          {% if category == 'success' %}bg-green-100 text-green-700 border border-green-200
          {% else %}bg-red-100 text-red-700 border border-red-200{% endif %}">
          {{ msg }}
        </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input
            type="email" name="email" required
            placeholder="ryanbarilla16@gmail.com"
            class="w-full px-4 py-3 rounded-xl border border-pink-200 bg-white focus:outline-none focus:ring-2 focus:ring-pink-400 text-sm transition-all"
          />
        </div>

        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-pink-400 to-purple-400 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl hover:from-pink-500 hover:to-purple-500 transition-all duration-300 text-sm">
          Send Verification Code
        </button>

        <div class="text-center">
          <a href="/admin/login" class="text-sm text-gray-400 hover:text-pink-500 transition-colors">← Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
