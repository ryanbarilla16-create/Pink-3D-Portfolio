<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Ryan Bien</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-white to-purple-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-pink-100 p-8">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-400 to-purple-400 flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">New Password</h1>
        <p class="text-sm text-gray-500 mt-1">Create a new password for your account</p>
      </div>

      <!-- Flash messages -->
      {% with flashes = get_flashed_messages(with_categories=true) %}
        {% for category, msg in flashes %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
          {% if category == 'success' %}bg-green-100 text-green-700 border border-green-200
          {% else %}bg-red-100 text-red-700 border border-red-200{% endif %}">
          {{ msg }}
        </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" class="space-y-5">

        <!-- New Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
          <div class="relative">
            <input type="password" name="password" id="newPass" required minlength="6"
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-pink-200 bg-white focus:outline-none focus:ring-2 focus:ring-pink-400 text-sm transition-all"/>
            <button type="button" onclick="togglePass('newPass','eye1','eyeoff1')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
              <svg id="eye1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eyeoff1" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <!-- Strength bar -->
          <div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div id="strengthBar" class="h-full rounded-full transition-all duration-300 w-0"></div>
          </div>
          <p id="strengthText" class="text-xs text-gray-400 mt-1"></p>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <div class="relative">
            <input type="password" name="confirm" id="confirmPass" required
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-pink-200 bg-white focus:outline-none focus:ring-2 focus:ring-pink-400 text-sm transition-all"/>
            <button type="button" onclick="togglePass('confirmPass','eye2','eyeoff2')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 transition-colors">
              <svg id="eye2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eyeoff2" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <p id="matchText" class="text-xs mt-1"></p>
        </div>

        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-pink-400 to-purple-400 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl hover:from-pink-500 hover:to-purple-500 transition-all duration-300 text-sm">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <script>
    function togglePass(inputId, eyeId, eyeOffId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      const eyeOff = document.getElementById(eyeOffId);
      if (input.type === 'password') {
        input.type = 'text';
        eye.classList.add('hidden');
        eyeOff.classList.remove('hidden');
      } else {
        input.type = 'password';
        eye.classList.remove('hidden');
        eyeOff.classList.add('hidden');
      }
    }

    // Password strength
    document.getElementById('newPass').addEventListener('input', function() {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = [
        { w: '20%', color: 'bg-red-400',    label: 'Very weak' },
        { w: '40%', color: 'bg-orange-400', label: 'Weak' },
        { w: '60%', color: 'bg-yellow-400', label: 'Fair' },
        { w: '80%', color: 'bg-blue-400',   label: 'Strong' },
        { w: '100%',color: 'bg-green-400',  label: 'Very strong' },
      ];
      const lvl = levels[Math.min(strength - 1, 4)] || { w: '0', color: '', label: '' };
      bar.className = `h-full rounded-full transition-all duration-300 ${lvl.color}`;
      bar.style.width = val ? lvl.w : '0';
      text.textContent = val ? lvl.label : '';
      text.className = `text-xs mt-1 ${lvl.color.replace('bg-', 'text-')}`;
    });

    // Password match
    document.getElementById('confirmPass').addEventListener('input', function() {
      const match = document.getElementById('matchText');
      if (this.value === document.getElementById('newPass').value) {
        match.textContent = '✓ Passwords match';
        match.className = 'text-xs mt-1 text-green-500';
      } else {
        match.textContent = '✗ Passwords do not match';
        match.className = 'text-xs mt-1 text-red-500';
      }
    });
  </script>
</body>
</html>
